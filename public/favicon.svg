<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Fondo con gradiente -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003d99;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo redondeado -->
  <rect width="192" height="192" rx="40" fill="url(#bgGradient)"/>
  
  <!-- Texto VN -->
  <text x="96" y="130" font-size="100" font-weight="bold" font-family="Arial, sans-serif" text-anchor="middle" fill="white">VN</text>
</svg>